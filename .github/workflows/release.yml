name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Set timezone to America/Sao_Paulo
        run: sudo timedatectl set-timezone America/Sao_Paulo

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install upx
        run: sudo apt-get install -y upx

      - name: Build linux/amd64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath \
            -ldflags "-s -w" \
            -o bin/office-converter-linux-amd64 .
          upx --best bin/office-converter-linux-amd64

      - name: Package Binary
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          tar -czvf "office-converter_${VERSION}_linux_amd64.tar.gz" -C bin office-converter-linux-amd64
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: office-converter_${{ env.VERSION }}_linux_amd64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
